<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" width="1200" height="800">
  <!-- Mountain silhouette background -->
  <defs>
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a05c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a05c" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="mistGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a05c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a05c" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#c9a05c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Far mountains -->
  <path d="M0 500 Q100 350 200 420 Q300 300 400 380 Q500 280 600 350 Q700 250 800 320 Q900 280 1000 350 Q1100 300 1200 380 L1200 800 L0 800Z" fill="url(#mountainGrad)"/>

  <!-- Mid mountains -->
  <path d="M0 550 Q150 450 250 500 Q350 420 500 480 Q600 400 700 460 Q800 420 950 480 Q1050 440 1200 500 L1200 800 L0 800Z" fill="url(#mountainGrad)" opacity="0.7"/>

  <!-- Near mountains -->
  <path d="M0 600 Q200 520 350 570 Q500 500 650 560 Q800 510 950 560 Q1100 520 1200 570 L1200 800 L0 800Z" fill="url(#mountainGrad)" opacity="0.5"/>

  <!-- Mist layers -->
  <ellipse cx="600" cy="450" rx="700" ry="80" fill="url(#mistGrad)"/>
  <ellipse cx="300" cy="520" rx="400" ry="60" fill="url(#mistGrad)" opacity="0.6"/>
  <ellipse cx="900" cy="500" rx="500" ry="70" fill="url(#mistGrad)" opacity="0.5"/>

  <!-- Temple silhouette on mountain -->
  <g transform="translate(560, 370)" opacity="0.12">
    <rect x="30" y="0" width="40" height="50" fill="#c9a05c"/>
    <polygon points="10,0 50,-30 90,0" fill="#c9a05c"/>
    <polygon points="20,0 50,-15 80,0" fill="#c9a05c"/>
    <rect x="45" y="-35" width="10" height="10" fill="#c9a05c"/>
  </g>

  <!-- Cloud wisps -->
  <path d="M100 300 Q200 280 300 300 Q400 290 500 310" stroke="#c9a05c" stroke-opacity="0.05" stroke-width="1" fill="none"/>
  <path d="M600 280 Q700 260 800 280 Q900 270 1000 290" stroke="#c9a05c" stroke-opacity="0.04" stroke-width="1" fill="none"/>
  <path d="M200 350 Q350 330 500 350 Q650 340 800 360" stroke="#c9a05c" stroke-opacity="0.03" stroke-width="1" fill="none"/>
</svg>
