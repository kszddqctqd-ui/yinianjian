er-dark/75">传统认为掉牙主长辈安康。现代心理学解为压力释放或对衰老的担忧，不必过虑。</p></button><button type="button" class="rounded-lg border p-3 text-left transition-colors border-gold/40 bg-gold/10 hover:border-gold/60"><div class="flex items-center justify-between"><span class="font-display text-base text-gold">梦见眼睛</span><span class="text-sm text-gold">中吉</span></div><p class="mt-1 line-clamp-2 text-sm text-paper-dark/75">象征对事物有新洞察。若梦中视物不清，则提示当下判断需谨慎。</p></button><button type="button" class="rounded-lg border p-3 text-left transition-colors border-vermillion/30 bg-vermillion/5 hover:border-gold/60"><div class="flex items-center justify-between"><span class="font-display text-base text-gold">梦见流血</span><span class="text-sm text-vermillion-light">上吉</span></div><p class="mt-1 line-clamp-2 text-sm text-paper-dark/75">鲜血在解梦学中反主财运将至，尤其大量流血更佳。莫被字面吓到。</p></button></div></div></div></div></main><button type="button" class="fixed right-3 z-40 flex size-10 items-center justify-center rounded-full border border-gold/50 bg-gradient-to-br from-gold/35 via-gold/20 to-vermillion/20 text-gold shadow-lg shadow-gold/20 backdrop-blur-md hover:from-gold/45 hover:to-vermillion/30 bottom-[calc(env(safe-area-inset-bottom)+88px)] md:right-4 md:bottom-4 md:size-14" aria-label="赚钱 / 开分站" title="赚钱 / 开分站"><span class="font-display text-[18px] text-gold drop-shadow-[0_0_10px_rgba(201,162,39,0.35)] md:text-[24px]">赚</span></button><nav class="fixed inset-x-0 bottom-0 z-40 border-t border-gold/20 bg-xuan-card/97 backdrop-blur-md md:hidden"><div class="grid grid-cols-6 px-1 pb-[max(env(safe-area-inset-bottom),0.5rem)] pt-2"><a class="flex flex-col items-center gap-0.5 rounded-md px-0 py-2 text-xs transition-colors duration-fast text-ink-muted" href="/"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-house size-5" aria-hidden="true"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0
